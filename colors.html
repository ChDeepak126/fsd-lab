<!DOCTYPE html>
<html lang="en">
<head>
    <title>css colors</title>
    <style>
     .rgb
     {
        color: rgb(0, 131, 254);
     }
     .hex
     {
        color: #d77d0e;
     }
     .hsl
     {
       color: hsl(350, 89%, 51%);
     }
     .rgba
     {
      color: rgba(0, 0, 255, 0.954);
     }
     .hsla
     {
      color: hsla(264, 85%, 49%, 0.935);
     }
     .color
     {
       color: tomato;
     }
    </style>
</head>
<body>
    <div class="rgb">rgb</div>
    <div class="hex">hex</div>
    <div class="hsl">hsl</div>
    <div class="rgba">rgba</div>
    <div class="hsla">hsla</div>
    <div class="color">color</div>
</body>
</html>
