<!DOCTYPE html>
<html>

<head>
    <title>Document</title>
</head>

<body>
<script>
    let amount = parseInt(prompt("Enter the deposited amount:"));

    let n100 = Math.floor(amount / 100);
    amount = amount % 100;

    let n50 = Math.floor(amount / 50);
    amount = amount % 50;

    let n20 = Math.floor(amount / 20);
    amount = amount % 20;

    let n10 = Math.floor(amount / 10);
    amount = amount % 10;

    let n5 = Math.floor(amount / 5);
    amount = amount % 5;

    let n2 = Math.floor(amount / 2);
    amount = amount % 2;

    let n1 = amount;

    console.log(n100 + " - 100's");
    console.log(n50 + " - 50's");
    console.log(n20 + " - 20's");
    console.log(n10 + " - 10's");
    console.log(n5 + " - 5's");
    console.log(n2 + " - 2's");
    console.log(n1 + " - 1's");
</script>
</body>

</html>
