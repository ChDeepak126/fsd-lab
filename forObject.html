<!DOCTYPE html>
<html>

<head>
    <title>Document</title>
</head>

<body>
    <script>

        person = { name: 'Meghana', age: 20, city: 'Tenali' }
        document.write("for-in -loop:<br>")
        document.write('-------------------<br>')
        for (let x in person) {
            document.write(`${person[x]}<br>`);
        }
        document.write(`<br><br>`)


        document.write("for-of -loop:<br>")
        document.write('-------------------<br>')
        for (let y of Object.values(person)) {

            document.write(`${y} <br>`);
        }
        document.write(`<br><br>`)

        document.write("for-each-method:<br>")
        document.write('-------------------<br>')
        Object.values(person).forEach(z => {
            document.write(`${z}<br>`)
        })




    </script>
</body>

</html>
