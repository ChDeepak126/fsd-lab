<!DOCTYPE html>
<html>
<head>
<title>Largest Number</title>
<script>

let a = Number(prompt("Enter first number"));
let b = Number(prompt("Enter second number"));
let c = Number(prompt("Enter third number"));

if(a==b && b==c)
{
    alert("EQUAL NUMBERS");
}
else
{
    let large = Math.max(a,b,c);
    alert(large + " LARGER NUMBER");
}

</script>
</head>

<body>
</body>
</html>
