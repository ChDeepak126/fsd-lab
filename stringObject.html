<!DOCTYPE html>
<html>
<body>

<script>

let text = "JavaScript";

document.write("Length: " + text.length + "<br>");

document.write("Uppercase: " + text.toUpperCase() + "<br>");

document.write("Lowercase: " + text.toLowerCase() + "<br>");

document.write("Character at position 2: " + text.charAt(2) + "<br>");

document.write("Index of 'S': " + text.indexOf("S"));

</script>

</body>
</html>
